<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小学语文同步听写-终极全功能版</title>
    <style>
        :root { --primary: #648dd1; --bg: #f0f2f5; --danger: #e56b60; --success: #78c2ad; --text: #333; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 500px; border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); overflow: hidden; display: flex; flex-direction: column; height: 98vh; }
        .nav-tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .tab-item { flex: 1; text-align: center; padding: 18px 0; cursor: pointer; font-weight: bold; color: #999; position: relative; }
        .tab-item.active { color: var(--primary); }
        .tab-item.active::after { content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 3px; background: var(--primary); border-radius: 3px; }
        .module-content { flex: 1; overflow-y: auto; padding: 20px; }
        .view-panel { display: none; }
        .view-panel.active { display: block; }
        .card-box { background: #f8f9fa; padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #f0f0f0; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #666; font-size: 13px; }
        select, input, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; font-size: 15px; box-sizing: border-box; margin-bottom: 8px; outline: none; background: #fff; }
        textarea { resize: vertical; min-height: 80px; }
        .player-card { text-align: center; padding: 30px 10px; border: 2px dashed #d0d7de; border-radius: 20px; margin: 15px 0; background: #fff; min-height: 140px; display: flex; flex-direction: column; justify-content: center; }
        #wordHidden { font-size: 48px; font-weight: bold; color: var(--primary); }
        .btn-main { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; display: block; }
        .btn-stop { background: #fff1f0; color: #cf1322; border: 1px solid #ffa39e; padding: 16px; border-radius: 14px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; display: none; }
        .btn-group-nav { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn-sub { background: #edf2f7; border: none; padding: 12px; border-radius: 12px; color: #4a5568; font-weight: bold; cursor: pointer; }
        .word-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .word-tag { padding: 15px; border: 2px solid #eee; border-radius: 14px; text-align: center; cursor: pointer; font-weight: bold; background: #fff; font-size: 18px; }
        .word-tag.done { border-color: var(--success); color: var(--success); background: #f6ffed; }
        .word-tag.still-wrong { border-color: var(--danger); color: var(--danger); background: #fff1f0; }
        .mistake-item { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #eee; }
        .btn-del { color: var(--danger); font-size: 14px; cursor: pointer; padding: 5px 10px; border: 1px solid #ffccc7; border-radius: 6px; background: #fff1f0; }
        .badge { background: var(--danger); color: white; padding: 2px 6px; border-radius: 10px; font-size: 11px; vertical-align: middle; margin-left: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-tabs">
        <div class="tab-item active" onclick="switchModule('dictation')">听写模块</div>
        <div class="tab-item" onclick="switchModule('mistakeBook')">错题本<span id="mistakeBadge" class="badge">0</span></div>
    </div>

    <div class="module-content">
        <div id="dictationView" class="view-panel active">
            <div class="card-box">
                <label>练习模式</label>
                <select id="modeSelect" onchange="toggleMode()">
                    <option value="textbook">课本同步联动听写</option>
                    <option value="custom">✨ 自定义词语听写</option>
                    <option value="mistakeMode">🔥 错题强化挑战</option>
                </select>

                <div id="textbookControls">
                    <label>教材版本</label>
                    <select id="verSelect" onchange="updateUnits()"></select>
                    <label>选择单元 / 类型</label>
                    <select id="unitSelect" onchange="updateLessons()"></select>
                    <label>选择课文 / 序号</label>
                    <select id="lessonSelect"></select>
                </div>

                <div id="customControls" style="display:none;">
                    <label>输入自定义词语 (空格或逗号分隔)</label>
                    <textarea id="customWordsInput" placeholder="在此输入新词语..."></textarea>
                </div>

                <div style="display:flex; gap:10px;">
                    <div style="flex:1"><label>间隔(s)</label><input type="number" id="interval" value="6"></div>
                    <div style="flex:1"><label>遍数</label><input type="number" id="repeat" value="2"></div>
                </div>
            </div>

            <div class="player-card">
                <div id="wordHidden">准备就绪</div>
                <div id="progressInfo" style="color:#999; font-size:13px; margin-top:10px;">点击下方开始</div>
                <div id="reinforceArea" style="display:none; margin-top:20px;">
                    <div id="reinforceTip" style="font-weight:bold; font-size:14px; margin-bottom:8px;"></div>
                    <div class="word-grid" id="checkGrid"></div>
                </div>
            </div>

            <button id="startBtn" class="btn-main" onclick="startDictation()">🚀 开始报听写</button>
            <button id="stopBtn" class="btn-stop" onclick="stopAndSwitch()">⏹ 停止并重选单元</button>

            <div class="btn-group-nav">
                <button class="btn-sub" onclick="navControl('prev')">上一个</button>
                <button class="btn-sub" onclick="navControl('replay')">重读</button>
                <button class="btn-sub" onclick="navControl('next')">下一个</button>
            </div>
        </div>

        <div id="mistakeBookView" class="view-panel">
            <button class="btn-main" onclick="quickDictMistakes()">🎧 听写所有错题</button>
            <div id="mistakeList"></div>
            <button class="btn-sub" style="width:100%; margin-top:20px; color:red;" onclick="clearAllMistakes()">清空全部错题</button>
        </div>
    </div>
</div>

const synth = window.speechSynthesis;
let currentWords = [];
let currentIndex = 0;
let isPlaying = false;
let timer = null;

// --- 初始化逻辑 ---
function init() {
    const vSel = document.getElementById('verSelect');
    vSel.innerHTML = Object.keys(TEXTBOOK_DATA).map(v => `<option value="${v}">${v}</option>`).join('');
    
    const savedCustom = localStorage.getItem('CUSTOM_WORDS_VAL');
    if(savedCustom) document.getElementById('customWordsInput').value = savedCustom;

    updateUnits();
    updateMistakeUI();
}

function updateUnits() {
    const v = document.getElementById('verSelect').value;
    const uSel = document.getElementById('unitSelect');
    uSel.innerHTML = Object.keys(TEXTBOOK_DATA[v]).map(u => `<option value="${u}">${u}</option>`).join('');
    updateLessons();
}

function updateLessons() {
    const v = document.getElementById('verSelect').value;
    const u = document.getElementById('unitSelect').value;
    const lSel = document.getElementById('lessonSelect');
    lSel.innerHTML = Object.keys(TEXTBOOK_DATA[v][u]).map(l => `<option value="${l}">${l}</option>`).join('');
}

function switchModule(moduleName) {
    document.querySelectorAll('.tab-item, .view-panel').forEach(el => el.classList.remove('active'));
    if (moduleName === 'dictation') {
        document.querySelectorAll('.tab-item')[0].classList.add('active');
        document.getElementById('dictationView').classList.add('active');
    } else {
        document.querySelectorAll('.tab-item')[1].classList.add('active');
        document.getElementById('mistakeBookView').classList.add('active');
        renderMistakeList();
    }
}

function toggleMode() {
    const mode = document.getElementById('modeSelect').value;
    document.getElementById('textbookControls').style.display = (mode === 'textbook' ? 'block' : 'none');
    document.getElementById('customControls').style.display = (mode === 'custom' ? 'block' : 'none');
}

// --- 听写控制核心 ---
function startDictation() {
    const mode = document.getElementById('modeSelect').value;
    if (mode === 'mistakeMode') {
        currentWords = getMistakes();
        if (!currentWords.length) return alert("错题本是空的！");
    } else if (mode === 'custom') {
        const val = document.getElementById('customWordsInput').value.trim();
        if (!val) return alert("请输入词语！");
        currentWords = val.split(/[,\s，\n]+/).filter(w => w.length > 0);
        localStorage.setItem('CUSTOM_WORDS_VAL', val);
    } else {
        const v = document.getElementById('verSelect').value, u = document.getElementById('unitSelect').value, l = document.getElementById('lessonSelect').value;
        currentWords = TEXTBOOK_DATA[v][u][l];
    }
    
    currentIndex = 0; isPlaying = true;
    setUIPlaying(true);
    document.getElementById('reinforceArea').style.display = "none";
    document.getElementById('wordHidden').style.display = "block";
    runPlayer();
}

function stopAndSwitch() {
    isPlaying = false; clearTimeout(timer); synth.cancel();
    setUIPlaying(false);
    document.getElementById('wordHidden').innerText = "已停止";
}

function setUIPlaying(playState) {
    document.getElementById('startBtn').style.display = playState ? "none" : "block";
    document.getElementById('stopBtn').style.display = playState ? "block" : "none";
    const ids = ['modeSelect', 'verSelect', 'unitSelect', 'lessonSelect', 'interval', 'repeat', 'customWordsInput'];
    ids.forEach(id => { const el = document.getElementById(id); if(el) el.disabled = playState; });
}

async function runPlayer() {
    if (!isPlaying || currentIndex >= currentWords.length) { if (currentIndex >= currentWords.length) finishDictation(); return; }
    const word = currentWords[currentIndex];
    document.getElementById('wordHidden').innerText = "???";
    document.getElementById('progressInfo').innerText = `正在听写：${currentIndex + 1} / ${currentWords.length}`;
    const repeat = parseInt(document.getElementById('repeat').value);
    for (let i = 0; i < repeat; i++) {
        if (!isPlaying) return;
        await speak(word);
        await new Promise(r => setTimeout(r, 1500));
    }
    timer = setTimeout(() => { currentIndex++; runPlayer(); }, parseInt(document.getElementById('interval').value) * 1000);
}

function speak(text) {
    return new Promise(res => {
        synth.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-CN'; u.rate = 0.8; u.onend = res;
        synth.speak(u);
    });
}

function finishDictation() {
    isPlaying = false; setUIPlaying(false);
    document.getElementById('wordHidden').style.display = "none";
    const mode = document.getElementById('modeSelect').value, grid = document.getElementById('checkGrid'), tip = document.getElementById('reinforceTip');
    document.getElementById('reinforceArea').style.display = "block";
    grid.innerHTML = "";
    if (mode === 'mistakeMode') {
        tip.innerHTML = "🎯 强化核对：点击写对的词移出";
        currentWords.forEach(word => {
            const el = document.createElement('div'); el.className = "word-tag still-wrong"; el.innerText = word;
            el.onclick = () => { el.className = "word-tag done"; removeMistake(word); setTimeout(() => el.style.visibility = 'hidden', 400); };
            grid.appendChild(el);
        });
    } else {
        tip.innerHTML = "📝 核对：点击写错的词存入错题本";
        currentWords.forEach(word => {
            const el = document.createElement('div'); el.className = "word-tag"; el.innerText = word;
            el.onclick = () => { if (el.classList.contains('still-wrong')) { el.classList.remove('still-wrong'); removeMistake(word); } else { el.classList.add('still-wrong'); addMistake(word); } };
            grid.appendChild(el);
        });
    }
}

// --- 错题本辅助 ---
function getMistakes() { return JSON.parse(localStorage.getItem('MISTAKE_STORAGE') || "[]"); }
function addMistake(word) { let list = getMistakes(); if (!list.includes(word)) { list.push(word); localStorage.setItem('MISTAKE_STORAGE', JSON.stringify(list)); updateMistakeUI(); } }
function removeMistake(word) { let list = getMistakes().filter(w => w !== word); localStorage.setItem('MISTAKE_STORAGE', JSON.stringify(list)); updateMistakeUI(); }
function updateMistakeUI() { document.getElementById('mistakeBadge').innerText = getMistakes().length; }
function renderMistakeList() {
    const listContainer = document.getElementById('mistakeList');
    const mistakes = getMistakes();
    listContainer.innerHTML = mistakes.length ? mistakes.map(word => `<div class="mistake-item"><b>${word}</b><span class="btn-del" onclick="removeMistake('${word}'); renderMistakeList();">移除</span></div>`).join('') : '<div style="text-align:center;color:#ccc;margin-top:40px;">暂无错题</div>';
}
function clearAllMistakes() { if(confirm("确定清空吗？")){ localStorage.setItem('MISTAKE_STORAGE', "[]"); updateMistakeUI(); renderMistakeList(); }}
function quickDictMistakes() { switchModule('dictation'); document.getElementById('modeSelect').value = 'mistakeMode'; toggleMode(); startDictation(); }
function navControl(type) {
    clearTimeout(timer); synth.cancel();
    if (type === 'next') currentIndex = Math.min(currentWords.length - 1, currentIndex + 1);
    if (type === 'prev') currentIndex = Math.max(0, currentIndex - 1);
    if (isPlaying) runPlayer();
}

init();
</script>
</body>
</html>
